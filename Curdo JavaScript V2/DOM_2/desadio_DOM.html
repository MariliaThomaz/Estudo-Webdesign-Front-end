
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style type="text/css">
        ul {
            list-style: none;
            margin: 0;
            padding: 0;

        }

        li {
            padding: 15px;
            margin: 10px;
            border: dashed 2px #ddd;
        }

        body {
            display: flex;
            margin: 0;
            padding: 0;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ccc;
            font-family: sans-serif;
            text-align: center;

        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: stretch;
            width: 80vw;
            height: 80vh;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, .5);
            padding: 15px;
        }

        .container>div {
            flex-basis: 50%;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="original">
            <h3>Original</h3>
            <ul>
                <li>item 1</li>
                <li>item 2</li>
                <li>item 3</li>
            </ul>
        </div>

        <div class="alvo">
            <h3>Alvo</h3>
            <ul>
                <li>item 1</li>
            </ul>
        </div>

    </div>

    <script type="text/javascript">
		// crie um nova li com texto "item 2" e a inclua na ul de div com class .alvo
            const newLi = document.createElement("li");
            newLi.textContent = "item 2";
            document.querySelector(".alvo ul").appendChild(newLi);
		//Mova a última li de orignal para alvo (mas antes da primeira li).
        const originalUl = document.querySelector(".original ul");
        const lastLi = originalUl.lastElementChild;
        const alvoUl = document.querySelector(".alvo ul");
        alvoUl.insertBefore(lastLi, alvoUl.firstChild);

         
        //Em outras palavras, a última li da original deve virar a primeira li de alvo
        const firstLiAlvo = alvoUl.firstElementChild;
        console.log(firstLiAlvo.textContent); // Deve exibir "item 3"   

		//altere o texto da primeira li de .alvo para "item 0"
        const firstLiAlvo2 = alvoUl.firstElementChild;
        firstLiAlvo2.textContent = "item 0";    

		//clone a ul de .original e a inclua na primeira li de .alvo
        const originalUlClone = originalUl.cloneNode(true);
        const firstLiAlvo3 = alvoUl.firstElementChild;
        firstLiAlvo3.appendChild(originalUlClone);

		//remova a ultima li (item2) da lista inserida na etapa anterior
        const insertedUl = firstLiAlvo3.querySelector("ul");
        const lastLiInserted = insertedUl.lastElementChild;
        insertedUl.removeChild(lastLiInserted);

		//remova as duas li's que sobraram na ul original
        const firstLiOriginal = originalUl.firstElementChild;
        const secondLiOriginal = firstLiOriginal.nextElementSibling;
        originalUl.removeChild(firstLiOriginal);
        originalUl.removeChild(secondLiOriginal);


    </script>
</body>

</html>
