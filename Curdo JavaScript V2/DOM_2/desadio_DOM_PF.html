
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document PF</title>

    <style type="text/css">
        ul {
            list-style: none;
            margin: 0;
            padding: 0;

        }

        li {
            padding: 15px;
            margin: 10px;
            border: dashed 2px #ddd;
        }

        body {
            display: flex;
            margin: 0;
            padding: 0;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ccc;
            font-family: sans-serif;
            text-align: center;

        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: stretch;
            width: 80vw;
            height: 80vh;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, .5);
            padding: 15px;
        }

        .container>div {
            flex-basis: 50%;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="original">
            <h3>Original</h3>
            <ul>
                <li>item 1</li>
                <li>item 2</li>
                <li>item 3</li>
            </ul>
        </div>

        <div class="alvo">
            <h3>Alvo</h3>
            <ul>
                <li>item 1</li>
            </ul>
        </div>

    </div>

    <script type="text/javascript">
        const alvoUl = document.querySelector(".alvo ul");
       const alOriginal = document.querySelector(".original ul");

		// crie um nova li com texto "item 2" e a inclua na ul de div com class .alvo
        const li = document.createElement("li");
        li.textContent = "item 2";
        alvoUl.appendChild(li);
        
           
            
		//Mova a última li de orignal para alvo (mas antes da primeira li).
        //Em outras palavras, a última li da original deve virar a primeira li de alvo
        alvoUl.insertBefore(alOriginal.lastElementChild, alvoUl.firstChild);
        //outra forma: alvoUl.insertBefore(alOriginal.lastElementChild, alvoUl.firstElementChild);


		//altere o texto da primeira li de .alvo para "item 0"
        alvoUl.firstElementChild.textContent = "item 0";
        //outra forma: alvoUl.children[0].textContent = "item 0";
       

		//clone a ul de .original e a inclua na primeira li de .alvo
        const clonedUl = alOriginal.cloneNode(true);
        alvoUl.firstElementChild.appendChild(clonedUl);

        
		//remova a ultima li (item2) da lista inserida na etapa anterior
        clonedUl.removeChild(clonedUl.lastElementChild); 
        
        //outra forma: const insertedUl = alvoUl.firstElementChild.querySelector("ul");
        //insertedUl.removeChild(insertedUl.lastElementChild);  
         

		//remova as duas li's que sobraram na ul original
        alOriginal.innerHTML = "";
        //outra forma:  alOriginal.removeChild(alOriginal.firstElementChild);
        //alOriginal.removeChild(alOriginal.firstElementChild);
        

    </script>
    
</body>

</html>
