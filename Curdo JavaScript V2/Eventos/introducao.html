<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Introdução aos Eventos</h1>
    <div class="container">Study event objects, propagation, and use of stopImmediatePropagation in the DOM.
        <p> </p>
        <button id="btn1">Clique em mim</button>
        <button id="btn2">Clique em mim também</button>
        <button id="btn3">Clique em mim também</button>
        <button id="btn4" onclick="alert('Você clicou no botão 4, Dom no nivevl 0')">Clique em mim também 4</button>
        <button id="btn5">Clique em mim também 5</button>
        <button id="btn6">Clique em mim também 6</button>
    </div>

    <hr>
    <h1>Delagação de eventos</h1>
    <div class="container2">
        <button>Botão 1</button>
        <button>Botão 2</button>
        <button>Botão 3</button>
    </div>

    <script>
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');
        const btn3 = document.getElementById('btn3');
        const btn4 = document.getElementById('btn4');
        const btn5 = document.getElementById('btn5');
        const btn6 = document.getElementById('btn6');


        //criar função para cada botão
        function handleClick1() {
            alert('não é recomendado criar uma função para cada botão, Dom no nivevl 0');
        }

        // Dom no nivevl 0
        btn1.onclick = function () {
            alert('Você clicou no botão 1, Dom no nivevl 0');
        }

        btn1.onclick = handleClick1; // Dom no nivevl 0  

        // não é recomendado criar uma função para cada botão, Dom no nivevl 0

        btn1.onclick = handleClick1// Dom no nivevl 0, sobrescreve a função anterior

        btn2.addEventListener('click', handleClick1); // D om no nivevl 2

        btn3.addEventListener('click', function () {
            alert('Você clicou no botão 3, Dom no nivevl 2 (função anônima)');
            //est é função anônima, não tem nome, não pode ser reutilizada, mas é útil para eventos simples, Dom no nivevl 2
        }); // D om no nivevl 2

        btn4.addEventListener('click', function () {
            alert('Você clicou no botão 4, Dom no nivevl 2 (função anônima)');
            //est é função anônima, não tem nome, não pode ser reutilizada, mas é útil para eventos simples, Dom no nivevl 2
        }); // D om no nivevl 2

        btn5.addEventListener('click', function () {
            console.log('Você clicou no botão 5, Dom no nivevl 2 (função anônima)');
            //est é função anônima, não tem nome, não pode ser reutilizada, mas é útil para eventos simples, Dom no nivevl 2

        }, false); // Dom no nivevl 2, o terceiro parâmetro é o useCapture,
        // que é opcional, por padrão é false, se for true, o evento será capturado na fase de
        // captura, se for false, o evento será capturado na fase de bolha

        document.addEventListener('click', function () {
            console.log('clicou no documento, Dom no nivevl 2');
            // Dom no nivevl 2, captura o clique em qualquer lugar do documento

        }, false); // Dom no nivevl 2, o terceiro parâmetro é o useCapture,
        // que é opcional, por padrão é false, se for true, o evento será
        // capturado na fase de captura, se for false, o evento será capturado na fase de bolha

        // então estudo foi sobre  o 3 parâmetro do addEventListener, que é o useCapture,
        // que é opcional, por padrão é false, se for true, o evento será capturado na
        // fase de captura, se for false, o evento será capturado na fase de bolha

        btn6.addEventListener('click', function (event) {
            console.log('Você clicou no botão 6, Dom no nivevl 2 (função anônima)');

            console.log(event); // o objeto do evento, que contém informações sobre o evento, como o tipo de evento, o elemento alvo, etc.

            event.stopImmediatePropagation(); // impede que outros eventos sejam executados, Dom no nivevl 2

            console.log("ola"); // esse console.log não será executado, porque o stopImmediatePropagation impede que outros eventos sejam executados, Dom no nivevl 2
            console.log("ola 2"); // esse console.log também não será executado, porque o stopImmediatePropagation impede que outros eventos sejam executados, Dom no nivevl 2

        }, false); // Dom no nivevl 2, o terceiro parâmetro é o useCapture,
        // que é opcional, por padrão é false, se for true, o evento será capturado na fase de captura, se for false, o evento será capturado na fase de bolha

        const container2 = document.querySelector('.container2');
        const btns = document.querySelectorAll('.container2 button');

        // Delegação de eventos, é uma técnica onde um único elemento pai é 
        //responsável por lidar com os eventos de seus elementos filhos, em vez 
        //de adicionar um ouvinte de evento para cada elemento filho individualmente.

        container2.addEventListener('click', function (event) {
            if (event.target.tagName === 'BUTTON') {
                alert('Você clicou no ' + event.target.textContent);
                //isto é delegação de eventos, o evento é capturado no container2,
                // e o event.target é o elemento que foi clicado, que é o botão, e o
                // textContent é o texto do botão
            }
        }); // Dom no nivevl 2, captura o clique em qualquer botão dentro do container2


        document.addEventListener('click', function (envent) {
            console.log('clicou no documento, Dom no nivevl 2');
            console.log(envent.target);
            console.log(envent.currentTarget);
            console.log(this);  
            // o event.target é o elemento que foi clicado, e o event.currentTarget é
            // o elemento que está ouvindo o evento, no caso, o documento, Dom no nivevl 2

        }, false);
        container2.addEventListener('click', function (event) {
            console.log('clicou no container2, Dom no nivevl 2');
            console.log(event.target);
            console.log(event.currentTarget);
            console.log(this); // o this é o elemento que está ouvindo o evento, no caso, o container2, Dom no nivevl 2
            //this é  dinâmico, ele pode mudar dependendo do contexto, no caso, o this é o container2, porque é o elemento que está ouvindo o evento, Dom no nivevl 2
            // o event.target é o elemento que foi clicado, e o event.currentTarget é

        });

         container2.addEventListener('click',  (event) => {
            console.log('clicou no container2, Dom no nivevl 2');
            console.log(event.target);
            console.log(event.currentTarget);
            console.log(this); 
            // o this é neste caso ele não é  mais dinâmico, ele é o elemento global,
            // porque a função é uma arrow function, e as arrow functions 
            //não tem o this, então o this é o elemento global, Dom no nivevl 2
            // this não sera  mais alterado, ele sempre será o elemento global, 
            //mesmo que o evento seja disparado em um elemento diferente, Dom no nivevl 2
            // this ele estatico, ele não muda, ele é o elemento global, mesmo que o evento 
            //seja disparado em um elemento diferente, Dom no nivevl 2
            // o event.target é o elemento que foi clicado, e o event.currentTarget é

        */
    </script>
</body>

</html>
